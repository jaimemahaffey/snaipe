name: Publish NuGet Packages

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Pack Snaipe.Agent
        run: dotnet pack src/Snaipe.Agent/Snaipe.Agent.csproj -c Release -p:Version=${{ steps.version.outputs.VERSION }} /m:1 -o ./nupkg

      - name: Pack Snaipe (Inspector tool)
        run: dotnet pack src/Snaipe.Inspector/Snaipe.Inspector.csproj -c Release -p:Version=${{ steps.version.outputs.VERSION }} /m:1 -o ./nupkg

      - name: Push to GitHub Packages
        shell: bash
        run: dotnet nuget push nupkg/*.nupkg --source github --api-key ${{ secrets.GITHUB_TOKEN }}
